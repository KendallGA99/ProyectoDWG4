<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:fragment="head">
        <title>Velvet Bakery</title>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1">
            <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
            <link th:href="@{/webjars/font-awesome/css/all.css}" rel="stylesheet"/>
            <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans&display=swap" rel="stylesheet">
                <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
                <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
                <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
                <script th:src="@{/js/idioma.js}"></script>
                <link rel="stylesheet" href="../css/index.css"/>   
                <link rel="stylesheet" href="../css/about_us.css"/> 
                <link rel="stylesheet" href="../css/menu.css"/> 
                <link rel="stylesheet" href="../css/order.css"/>
                </head>
                <body>
                    <header th:fragment="header" class="bg-white">
                        <div class="container py-3">
                            <div class="row align-items-center">
                                <!-- Logo on the left -->
                                <div class="col-auto">
                                    <a th:href="@{/}" class="d-flex align-items-center text-decoration-none">
                                        <img th:src="@{/img/Velvet Logo.png}" alt="Velvet Bakery" width="200" class="img-fluid me-2"/>
                                    </a>
                                </div>

                                <!-- Navigation links in center -->
                                <div class="col d-none d-lg-flex justify-content-center">
                                    <a class="text-decoration-none text-dark mx-4 fw-normal" th:href="@{/aboutus/about_us}" id="AboutUs">[[#{boton.about_us}]]</a>
                                    <a class="text-decoration-none text-dark mx-4 fw-normal" th:href="@{/menu/menu}" id="Menu">[[#{boton.menu}]]</a>
                                    <a class="text-decoration-none text-dark mx-4 fw-normal" th:href="@{/ubicacion/ubicacion}" id="Locations">[[#{boton.ubicacion}]]</a>
                                    <!---<a class="text-decoration-none text-dark mx-4 fw-normal" th:href="@{/mostrarcarrito}" id="Cart">[[#{boton.cart}]]</a>--->
                                </div>

                                <!-- Order and Login buttons on right -->
                                <div class="col-auto ms-auto d-flex align-items-center">
                                    <a class="btn rounded-4 px-4 py-3 me-3 text-white fw-bold" 
                                       style="background-color:#00B67A;" th:href="@{/order}" id="OrderNow">
                                        <img th:src="@{/img/Carrito.png}" alt="Carrito" style="width: 30px; height: 30px;">
                                    </a>
                                    <a class="btn btn-link text-dark text-decoration-none fw-normal" th:href="@{/usuario/registro}" id="Login">Login</a>

                                    <!-- Mobile menu button -->
                                    <button class="btn d-lg-none ms-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
                                        <i class="fas fa-bars fs-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <hr class="m-0 opacity-25">

                            <!-- Mobile menu -->
                            <div class="offcanvas offcanvas-end d-lg-none" tabindex="-1" id="mobileMenu">
                                <div class="offcanvas-header">
                                    <h5 class="offcanvas-title">Menu</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
                                </div>
                                <div class="offcanvas-body">
                                    <div class="d-flex flex-column">
                                        <a class="py-2 text-decoration-none text-dark" th:href="@{/aboutUs}">[[#{boton.about_us}]]</a>
                                        <a class="py-2 text-decoration-none text-dark" th:href="@{/menu}">[[#{boton.menu}]]</a>
                                        <a class="py-2 text-decoration-none text-dark" th:href="@{/locations}">[[#{boton.ubicacion}]]</a>
                                        <a class="py-2 text-decoration-none text-dark" th:href="@{/mostrarcarrito}">[[#{boton.cart}]]</a>
                                        <div class="mt-3">
                                            <button class="btn btn-sm btn-outline-secondary me-2" onclick="traducirEsp()">English</button>
                                            <button class="btn btn-sm btn-outline-secondary" onclick="traducirIng()">Spanish</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                    </header>

                    <!-- FOOTER -->
                    <footer th:fragment="footer" class="mt-5 py-3 border-top bg-white">
                        <div class="container">
                            <div class="row">
                                <div class="col-md-6">
                                    <button class="btn btn-outline-secondary btn-sm me-2" onclick="traducirEsp()">English</button>
                                    <button class="btn btn-outline-secondary btn-sm" onclick="traducirIng()">Spanish</button>
                                </div>
                                <div class="col-md-6 text-end">
                                    <p class="mb-1">All Material 2025 Velvet, All Rights Reserved</p>
                                    <p class="mb-1">
                                        <a th:href="@{/terms_of_service}" class="text-decoration-none">Terms of Service</a>
                                        <span class="mx-2">|</span>
                                        <a th:href="@{/privacy_policy}" class="text-decoration-none">Privacy Policy</a>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </footer>
                </body>
                </html>
